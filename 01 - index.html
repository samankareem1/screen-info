<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Screen Object Demo</title>

    <style>
      body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
      }

      button {
        padding: 12px 30px;
        font-size: 1.1rem;
        border: none;
        border-radius: 8px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #0056b3;
        transform: scale(1.05);
      }

      #info {
        margin-top: 25px;
        padding: 20px;
        width: 420px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 1.1rem;
        line-height: 1.8rem;
      }
    </style>
  </head>

  <body>
    <h2>Screen Object Demo</h2>

    <!-- <button onclick="showInfo()">Show Screen Info</button> -->
    <button id="btn">Show Screen Info</button>

    <div id="info"></div>

    <script>
      function showInfo() {
        /*
        🖥️ 1. screen.width: Returns the total width of the user’s screen (in pixels).
        🖥️ 2. screen.height: Returns the total height of the screen.
        🖥️ 3. screen.availWidth: Returns the width of the screen minus OS interface elements, like:

              Taskbar
              Dock
              System UI area

        🖥️ 4. screen.availHeight: Same concept as availWidth, but for height.
        🎨 5. screen.colorDepth: Returns the number of bits used to display colors.
        🎨 6. screen.pixelDepth: Usually matches colorDepth.
      */

        document.getElementById("info").innerHTML = `
        <strong>Screen Width:</strong> ${screen.width}px <br>
        <strong>Screen Height:</strong> ${screen.height}px <br><br>

        <strong>Available Width:</strong> ${screen.availWidth}px <br>
        <strong>Available Height:</strong> ${screen.availHeight}px <br><br>

        <strong>Color Depth:</strong> ${screen.colorDepth} bits <br>
        <strong>Pixel Depth:</strong> ${screen.pixelDepth} bits
      `;
      }
      document.getElementById("btn").addEventListener("click", showInfo);
    </script>
  </body>
</html>
